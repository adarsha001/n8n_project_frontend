<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Focus Podcast | How far should governments go in using AI? - News Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .news-card {
            max-width: 500px;
            width: 100%;
            background: white;
            border: 1px solid #ddd;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top Red Bar */
        .top-bar {
            height: 12px;
            background: #ff1e1e;
            width: 100%;
        }

        /* Logo */
        .logo {
            display: flex;
            justify-content: center;
            padding: 3px 0;
        }

        .logo span {
            background: #ffd000;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 16px;
        }

        /* Headline */
        .headline-section {
            padding: 10px 20px 20px;
            text-align: center;
        }

        .headline-section h1 {
            font-size: 26px;
            font-weight: 900;
            line-height: 1.2;
            text-transform: uppercase;
        }

        /* Image */
        .image-container {
            width: 100%;
            height: 300px;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Middle Section */
        .detail-section {
            padding: 20px;
            text-align: center;
            background: #f2f2f2;
        }

        .detail-section h2 {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Green Gradient Highlight Section */
.highlight {
    background: linear-gradient(180deg, #ffffff 0%, #d4f8d4 50%, #19e635 100%);
    color: #000000;
    padding: 15px;
    text-align: center;
}

        .highlight p {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
        }

    </style>
</head>
<body>
    <div class="news-card">

        <div class="top-bar"></div>

        <div class="logo">
            <span>swiftfeed</span>
        </div>

        <div class="headline-section">
            <h1>In Focus Podcast | How far should governments go in using AI?</h1>
        </div>

        <div class="image-container">
            <img src="https://res.cloudinary.com/dq32mhbbt/image/upload/v1773944426/news/10216_19_3_2026_17_43_9_2_19_03_2026_ELECTION_LOGO_1_k4tcto.jpg" />
        </div>

        <div class="highlight">
            <h2>Anti-establishment user-generated content (X accounts) were largely withheld from platforms such as Facebook and YouTube due to concerns about spreading false information.</h2>
        </div>

        <!--  -->

  
    </div>
</body>
</html>
