<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftFeed News Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --red:    #E8160C;
  --yellow: #F5C100;
  --green:  #16B84E;
  --ink:    #0D0D0D;
  --white:  #FAFAFA;
}

body {
  font-family: 'Barlow', sans-serif;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 40px 20px;
}

/* ── CARD ───────────────────────────────────────── */
.news-card {
  width: 1080px;
  height: 1080px;
  background: var(--white);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 40px 120px rgba(0,0,0,0.7);
}

/* ═══════════════════════════════════════════
   🔴 RED — TOP — STOP
   Red bar + dark header + headline
═══════════════════════════════════════════ */
.top-red-bar {
  height: 14px;
  background: var(--red);
  flex-shrink: 0;
}

.header {
  background: var(--ink);
  padding: 16px 32px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

/* ── BIRD + NEST LOGO ── */
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo-svg-wrap svg {
  width: 76px;
  height: 54px;
  display: block;
}
.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  letter-spacing: 0.08em;
  color: var(--white);
  line-height: 1;
}
.logo-text em {
  font-style: normal;
  color: var(--yellow);
}

.header-meta { text-align: right; }
.header-meta .tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--white);
  background: var(--red);
  padding: 4px 12px;
  border-radius: 2px;
  display: inline-block;
}
.header-meta .date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.4);
  margin-top: 5px;
  text-transform: uppercase;
}

/* headline — left red accent border signals STOP */
.headline-section {
  background: var(--white);
  padding: 18px 32px 16px;
  flex-shrink: 0;
  border-left: 8px solid var(--red);
  border-bottom: 2px solid #e2e2e2;
}
.stop-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.stop-label::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red);
  display: inline-block;
  flex-shrink: 0;
}
.headline-section h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 70px;
  line-height: 0.93;
  letter-spacing: 0.01em;
  color: var(--ink);
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════
   🖼 IMAGE — bridge between red & yellow
═══════════════════════════════════════════ */
.image-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}
.image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.image-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 45%, rgba(13,13,13,0.58) 100%);
  pointer-events: none;
}

/* ═══════════════════════════════════════════
   🟡 YELLOW — MIDDLE — WAIT
   Key headline fact
═══════════════════════════════════════════ */
.band-wait {
  flex-shrink: 0;
  background: var(--yellow);
  padding: 15px 32px;
  display: flex;
  align-items: center;
  gap: 18px;
  border-top: 5px solid #c9a000;
  border-bottom: 5px solid #c9a000;
}
.band-wait .signal-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 0.22em;
  color: var(--yellow);
  background: var(--ink);
  padding: 4px 11px 3px;
  border-radius: 3px;
  flex-shrink: 0;
  line-height: 1;
}
.band-wait h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  color: var(--ink);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.15;
}

/* ═══════════════════════════════════════════
   🟢 GREEN — BOTTOM — GO
   Detail fact + footer
═══════════════════════════════════════════ */
.band-go-fact {
  flex-shrink: 0;
  background: #0ea83e;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 18px;
}
.band-go-fact .signal-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 0.22em;
  color: #0ea83e;
  background: var(--white);
  padding: 4px 11px 3px;
  border-radius: 3px;
  flex-shrink: 0;
  line-height: 1;
}
.band-go-fact p {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 19px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.02em;
  line-height: 1.2;
}

.band-go-footer {
  flex-shrink: 0;
  background: var(--green);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.band-go-footer span {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.8);
}
.band-go-footer .center {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.35em;
  color: var(--white);
}
</style>
</head>
<body>
<div class="news-card">

  <!-- 🔴 RED stripe at very top -->
  <div class="top-red-bar"></div>

  <!-- HEADER with Bird+Nest logo -->
  <div class="header">
    <div class="logo-wrap">

      <!-- SVG: Swift bird flying toward nest -->
    

      <div class="logo-text">Swift<em>Feed</em></div>
    </div>

    <div class="header-meta">
      <div class="tag" id="categoryTag">BREAKING</div>
      <div class="date" id="dateLabel">Today</div>
    </div>
  </div>

  <!-- 🔴 HEADLINE — STOP -->
  <div class="headline-section">
    <div class="stop-label">Stop &amp; Read</div>
    <h1 id="headline">Loading Headline…</h1>
  </div>

  <!-- IMAGE -->
  <div class="image-wrap">
    <img id="newsImage" src="" alt="News" />
  </div>

  <!-- 🟡 KEY FACT — WAIT -->
  <div class="band-wait">
    <div class="signal-badge">WAIT</div>
    <h2 id="fact1">Key fact loading…</h2>
  </div>

  <!-- 🟢 DETAIL — GO -->
  <div class="band-go-fact" id="fact2Container" style="display:none;">
    <div class="signal-badge">GO</div>
    <p id="fact2"></p>
  </div>

  <!-- 🟢 FOOTER -->
  <div class="band-go-footer">
    <span>swiftfeed.com</span>
    <span class="center">GO DEEPER ›</span>
    <span>Stay Informed</span>
  </div>

</div>

<script>
  const params   = new URLSearchParams(window.location.search);
  const headline = params.get("headline");
  const image    = params.get("image");
  const fact1    = params.get("fact1");
  const fact2    = params.get("fact2");
  const category = params.get("category");
  const date     = params.get("date");

  document.addEventListener("DOMContentLoaded", () => {
    if (headline) document.getElementById("headline").innerText = headline;
    if (image)    document.getElementById("newsImage").src = image;
    if (fact1)    document.getElementById("fact1").innerText = fact1;
    if (fact2) {
      document.getElementById("fact2").innerText = fact2;
      document.getElementById("fact2Container").style.display = "flex";
    }
    if (category) document.getElementById("categoryTag").innerText = category.toUpperCase();
    if (date) {
      document.getElementById("dateLabel").innerText = date;
    } else {
      const d = new Date();
      document.getElementById("dateLabel").innerText =
        d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }
  });
</script>
</body>
</html>
