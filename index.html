<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftFeed | Pro Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --stop-red: #D90429;
        --wait-yellow: #FFB703;
        --go-green: #008148;
        --ink: #121212;
        --white: #FFFFFF;
        --grey: #666666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .news-card {
        width: 1080px;
        height: 1080px;
        background: var(--white);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* 🔴 STOP SECTION */
    .section-stop {
        background: var(--white);
        /* 🚨 CHANGE: Removed border-top: 24px solid var(--stop-red); */
        padding: 40px 60px;
        flex-shrink: 0;
    }

    .brand-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .logo-text {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 48px;
        letter-spacing: 2px;
        color: var(--ink);
    }
    .logo-text span { color: var(--stop-red); }

    .meta-tag {
        font-weight: 900;
        font-size: 14px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--stop-red);
        border: 2px solid var(--stop-red);
        padding: 6px 16px;
    }

    .headline {
        font-size: 82px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -3px;
        color: var(--ink);
        text-transform: uppercase;
    }

    /* 🖼 IMAGE SECTION (BIGGER) */
    .image-container {
        /* 🚨 CHANGE: Increased height to 60% and removed flex-grow */
        height: 60%;
        width: 100%;
        position: relative;
        background: #eee;
        overflow: hidden;
    }
    .image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* 🟡 WAIT SECTION (Smaller padding to make space) */
    .section-wait {
        background: var(--wait-yellow);
        padding: 20px 60px; /* Reduced vertical padding */
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .signal-label {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 18px; /* Slightly smaller font */
        letter-spacing: 1px;
        color: rgba(0,0,0,0.6);
        margin-bottom: 2px;
    }

    .fact-primary {
        font-size: 30px; /* Slightly smaller font */
        font-weight: 800;
        color: var(--ink);
        line-height: 1.1;
    }

    /* 🟢 GO SECTION (Smaller padding to make space) */
    .section-go {
        background: var(--go-green);
        color: var(--white);
        padding: 20px 60px; /* Reduced vertical padding */
    }

    .fact-secondary {
        font-size: 22px; /* Slightly smaller font */
        font-weight: 400;
        line-height: 1.3;
        margin-bottom: 15px; /* Reduced margin */
    }

    /* 🔗 SOURCE FOOTER */
    .source-footer {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-top: 15px; /* Reduced padding */
        border-top: 1px solid rgba(255,255,255,0.2);
        font-size: 13px; /* Slightly smaller font */
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: rgba(255,255,255,0.8);
    }

    .source-label { color: var(--wait-yellow); }

</style>
</head>
<body>

<div class="news-card">
    <header class="section-stop">
        <div class="brand-row">
            <div class="logo-text">SWIFT<span>FEED</span></div>
            <div id="categoryTag" class="meta-tag">BREAKING</div>
        </div>
        <h1 class="headline" id="headline">Tech Giant Unveils Neural Interface</h1>
    </header>

    <div class="image-container">
        <img id="newsImage" src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=1080" />
    </div>

    <section class="section-wait">
        <div class="signal-label">KEY INSIGHT</div>
        <div class="fact-primary" id="fact1">The device connects directly to the motor cortex, bypassing damaged nerves.</div>
    </section>

    <footer class="section-go">
        <div class="fact-secondary" id="fact2">Initial trials have allowed paralyzed patients to control robotic limbs with unprecedented precision.</div>
        
        <div class="source-footer">
            <span class="source-label">Source:</span>
            <span id="sourceName">MIT Technology Review</span>
        </div>
    </footer>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    
    document.addEventListener("DOMContentLoaded", () => {
        const headline = params.get("headline");
        const image = params.get("image");
        const fact1 = params.get("fact1");
        const fact2 = params.get("fact2");
        const source = params.get("source");
        const category = params.get("category");

        if (headline) document.getElementById("headline").innerText = headline;
        if (image)    document.getElementById("newsImage").src = image;
        if (fact1)    document.getElementById("fact1").innerText = fact1;
        if (fact2)    document.getElementById("fact2").innerText = fact2;
        if (source)   document.getElementById("sourceName").innerText = source;
        if (category) document.getElementById("categoryTag").innerText = category.toUpperCase();
    });
</script>
</body>
</html>
