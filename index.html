<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Card</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.news-card {
    width: 1080px;
    height: 1080px;
}

/* Top Bar */
.top-bar {
    height: 12px;
    background: #ff1e1e;
    width: 100%;
}

/* Logo */
.logo {
    display: flex;
    justify-content: center;
    padding: 10px 0;
}

.logo span {
    background: #ffd000;
    padding: 8px 18px;
    border-radius: 50px;
    font-weight: 900;
    font-size: 16px;
}

/* Headline */
.headline-section {
    padding: 20px;
    text-align: center;
}

.headline-section h1 {
    font-size: 32px;
    font-weight: 900;
    line-height: 1.2;
    text-transform: uppercase;
}

/* Image */
.image-container {
    width: 100%;
    height: 350px;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Highlight */
.highlight {
    background: linear-gradient(180deg, #ffffff 0%, #d4f8d4 50%, #19e635 100%);
    color: #000000;
    padding: 20px;
    text-align: center;
}

.highlight h2 {
    font-size: 22px;
    font-weight: 900;
}

.highlight p {
    font-size: 18px;
    font-weight: 800;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="news-card">

    <div class="top-bar"></div>

    <div class="logo">
        <span>swiftfeed</span>
    </div>

    <div class="headline-section">
        <h1 id="headline">Loading...</h1>
    </div>

    <div class="image-container">
        <img id="newsImage" src="" />
    </div>

    <div class="highlight">
        <h2 id="fact1"></h2>
    </div>

    <div class="highlight" id="fact2Container" style="display:none;">
        <p id="fact2"></p>
    </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const headline = params.get("headline");
const image = params.get("image");
const fact1 = params.get("fact1");
const fact2 = params.get("fact2");

document.addEventListener("DOMContentLoaded", () => {

    // Headline
    if (headline) {
        document.getElementById("headline").innerText = headline;
    }

    // Image
    if (image) {
        document.getElementById("newsImage").src = image;
    }

    // Fact 1
    if (fact1) {
        document.getElementById("fact1").innerText = fact1;
    }

    // Fact 2 (optional)
    if (fact2) {
        document.getElementById("fact2").innerText = fact2;
        document.getElementById("fact2Container").style.display = "block";
    }
});
</script>

</body>
</html>
