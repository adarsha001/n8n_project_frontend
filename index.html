<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftFeed | Pro Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --stop-red: #D90429;
        --wait-yellow: #FFB703;
        --go-green: #008148;
        --ink: #121212;
        --white: #FFFFFF;
        --grey: #666666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .news-card {
        width: 1080px;
        height: 1080px;
        background: var(--white);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* 🔴 STOP SECTION */
    .section-stop {
        background: var(--white);
        border-top: 24px solid var(--stop-red);
        padding: 40px 60px;
        flex-shrink: 0;
    }

    .brand-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .logo-text {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 48px;
        letter-spacing: 2px;
        color: var(--ink);
    }
    .logo-text span { color: var(--stop-red); }

    .meta-tag {
        font-weight: 900;
        font-size: 14px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--stop-red);
        border: 2px solid var(--stop-red);
        padding: 6px 16px;
    }

    .headline {
        font-size: 82px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -3px;
        color: var(--ink);
        text-transform: uppercase;
    }

    /* 🖼 IMAGE SECTION */
    .image-container {
        flex-grow: 1;
        position: relative;
        background: #eee;
        overflow: hidden;
    }
    .image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* 🟡 WAIT SECTION */
    .section-wait {
        background: var(--wait-yellow);
        padding: 35px 60px;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .signal-label {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 20px;
        letter-spacing: 1px;
        color: rgba(0,0,0,0.6);
        margin-bottom: 5px;
    }

    .fact-primary {
        font-size: 34px;
        font-weight: 800;
        color: var(--ink);
        line-height: 1.1;
    }

    /* 🟢 GO SECTION */
    .section-go {
        background: var(--go-green);
        color: var(--white);
        padding: 40px 60px;
    }

    .fact-secondary {
        font-size: 24px;
        font-weight: 400;
        line-height: 1.4;
        margin-bottom: 25px;
    }

    /* 🔗 SOURCE FOOTER */
    .source-footer {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-top: 20px;
        border-top: 1px solid rgba(255,255,255,0.2);
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: rgba(255,255,255,0.8);
    }

    .source-label { color: var(--wait-yellow); }

</style>
</head>
<body>

<div class="news-card">
    <header class="section-stop">
        <div class="brand-row">
            <div class="logo-text">SWIFT<span>FEED</span></div>
            <div id="categoryTag" class="meta-tag">BREAKING</div>
        </div>
        <h1 class="headline" id="headline">Loading...</h1>
    </header>

    <div class="image-container">
        <img id="newsImage" src="" />
    </div>

    <section class="section-wait">

        <div class="fact-primary" id="fact1"></div>
    </section>

    <footer class="section-go">
        <div class="fact-secondary" id="fact2"></div>
        
        <div class="source-footer">
            <span class="source-label">Source:</span>
            <span id="sourceName">External Report</span>
        </div>
    </footer>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    
    document.addEventListener("DOMContentLoaded", () => {
        const headline = params.get("headline");
        const image = params.get("image");
        const fact1 = params.get("fact1");
        const fact2 = params.get("fact2");
        const source = params.get("source");
        const category = params.get("category");

        if (headline) document.getElementById("headline").innerText = headline;
        if (image)    document.getElementById("newsImage").src = image;
        if (fact1)    document.getElementById("fact1").innerText = fact1;
        if (fact2)    document.getElementById("fact2").innerText = fact2;
        if (source)   document.getElementById("sourceName").innerText = source;
        if (category) document.getElementById("categoryTag").innerText = category.toUpperCase();
    });
</script>
</body>
</html>
