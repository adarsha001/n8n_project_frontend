<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Arial Black', Gadget, sans-serif;
    padding: 10px;
  }

  .news-card {
    max-width: 1080px;
    width: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .header {
    padding: 30px 20px;
    text-align: center;
  }

  .headline {
    font-size: 42px;
    font-weight: 900;
    line-height: 1.1;
    color: #f6e500;
    text-transform: uppercase;
    letter-spacing: -1px;
  }

  .image-container {
    width: 100%;
    background: #000;
  }

  .image-container img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
  }

  .content {
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    text-align: center;
  }

  .primary-text {
    font-size: 32px;
    font-weight: 900;
    color: #f6e500;
    line-height: 1;
    text-transform: uppercase;
  }

  .secondary-text {
    font-size: 38px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    text-transform: uppercase;
  }

  /* REFINED FOOTER - Including Emojis, Source, and Watermark */
  .footer {
    padding: 10px 20px 40px 20px;
    text-align: center;
  }

  .emojis {
    font-size: 36px;
    margin-bottom: 20px;
    display: block;
  }

  .source {
    color: #fff;
    font-size: 14px;
    text-transform: uppercase;
    margin-bottom: 5px;
    font-family: sans-serif;
    font-weight: bold;
  }

  .source span {
    color: #f6e500; /* Source name highlighted in yellow */
  }

  .watermark {
    color: #555;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: sans-serif;
  }

  /* Hidden UI from original template */
  .accent-strip, .brand-row, .insight-label, .category {
    display: none;
  }
</style>
</head>
<body>

<div class="news-card">
  <div class="header">
    <div id="headline" class="headline">
      ACTOR FROM RAMAYANA, WHO PLAYS VISHWAMITRA, RECENTLY SHARED HIGH PRAISE FOR YASH'S PORTRAYAL OF RAVANA
    </div>
  </div>

  <div class="image-container">
    <img id="newsImage" alt="Ravana" src="https://via.placeholder.com/1080x1350/111/f6e500?text=IMAGE+GOES+HERE">
  </div>

  <div class="content">
    <!-- <div id="fact1" class="primary-text">
      HE SAID: "WORKING WITH YASH IN RAMAYANA... WHAT AN ACTOR. THE AURA, THE POWER, THE WAY HE'S OWNED RAVANA — JUST_CRAZY."
    </div> -->

    <div id="fact2" class="secondary-text">
      THE RAVANA STORM IS BUILDING.
    </div>
  </div>

  <div class="footer">

    <div class="source">
      SOURCE: <span id="sourceName"></span>
    </div>
  
  </div>
</div>

<script>
  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    
    function setText(elementId, newText) {
      const el = document.getElementById(elementId);
      if (el && newText) el.innerText = newText.toUpperCase();
    }

    function setImage(imageUrl) {
      const imgEl = document.getElementById("newsImage");
      if (imgEl && imageUrl) imgEl.src = imageUrl;
    }

    document.addEventListener("DOMContentLoaded", () => {
      const headlineParam = urlParams.get("headline");
      const fact1Param = urlParams.get("fact1");
      const fact2Param = urlParams.get("fact2");
      const sourceParam = urlParams.get("source");
      const imageParam = urlParams.get("image");

      if (headlineParam) setText("headline", headlineParam);
      if (fact1Param) setText("fact1", fact1Param);
      if (fact2Param) setText("fact2", fact2Param);
      if (sourceParam) setText("sourceName", sourceParam);
      if (imageParam) setImage(imageParam);
    });
  })();
</script>

</body>
</html>
