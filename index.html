<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftFeed | Pro Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    /* Professional Color Palette */
    :root {
        --stop-red: #D90429;      /* Deep, urgent crimson */
        --wait-yellow: #FFB703;   /* Rich amber */
        --go-green: #008148;      /* Trustworthy forest green */
        --ink: #121212;
        --white: #FFFFFF;
        --off-white: #F8F9FA;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    /* 1080x1080 Square Card */
    .news-card {
        width: 1080px;
        height: 1080px;
        background: var(--white);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 0 100px rgba(0,0,0,0.5);
    }

    /* 🔴 STOP SECTION: BRAND & HEADLINE */
    .section-stop {
        background: var(--white);
        border-top: 24px solid var(--stop-red); /* The "Stop" signal */
        padding: 40px 60px;
        flex-shrink: 0;
    }

    .brand-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .logo-text {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 48px;
        letter-spacing: 2px;
        color: var(--ink);
    }
    .logo-text span { color: var(--stop-red); }

    .meta-tag {
        font-weight: 900;
        font-size: 14px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--stop-red);
        border: 2px solid var(--stop-red);
        padding: 6px 16px;
    }

    .headline {
        font-size: 82px;
        font-weight: 900;
        line-height: 0.95;
        letter-spacing: -3px;
        color: var(--ink);
        text-transform: uppercase;
    }

    /* 🖼 IMAGE SECTION */
    .image-container {
        flex-grow: 1;
        position: relative;
        background: #eee;
        overflow: hidden;
    }
    .image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* 🟡 WAIT SECTION: KEY INSIGHT */
    .section-wait {
        background: var(--wait-yellow);
        padding: 30px 60px;
        display: flex;
        align-items: center;
        gap: 30px;
        border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .signal-label {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 24px;
        background: var(--ink);
        color: var(--white);
        padding: 4px 12px;
        border-radius: 4px;
    }

    .fact-primary {
        font-size: 32px;
        font-weight: 700;
        color: var(--ink);
        line-height: 1.1;
        letter-spacing: -0.5px;
    }

    /* 🟢 GO SECTION: ACTION / DETAIL */
    .section-go {
        background: var(--go-green);
        color: var(--white);
        padding: 40px 60px;
        position: relative;
    }

    .fact-secondary {
        font-size: 24px;
        font-weight: 400;
        line-height: 1.4;
        opacity: 0.95;
        max-width: 90%;
        margin-bottom: 20px;
    }

    .footer-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
        padding-top: 20px;
        border-top: 1px solid rgba(255,255,255,0.2);
    }

    .url {
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-size: 14px;
    }

    .cta {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 28px;
        letter-spacing: 2px;
    }

</style>
</head>
<body>

<div class="news-card">
    
    <header class="section-stop">
        <div class="brand-row">
            <div class="logo-text">SWIFT<span>FEED</span></div>
            <div class="meta-tag" id="categoryTag">BREAKING</div>
        </div>
        <h1 class="headline" id="headline"></h1>
    </header>

    <div class="image-container">
        <img id="newsImage" src="https://images.unsplash.com/photo-1611974714658-20da5d376a92?auto=format&fit=crop&q=80&w=1080" />
    </div>

    <section class="section-wait">
        <!-- <div class="signal-label">WAIT</div> -->
        <div class="fact-primary" id="fact1"></div>
    </section>

    <footer class="section-go">
        <!-- <div class="signal-label" style="background: white; color: var(--go-green); margin-bottom: 15px; display: inline-block;">GO</div> -->
        <div class="fact-secondary" id="fact2">
          
        </div>
        
        <!-- <div class="footer-bar">
            <span class="url">Swiftfeed.com</span>
            <span class="cta">KEEP MOVING ›</span>
        </div> -->
    </footer>

</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const elements = {
        headline: document.getElementById("headline"),
        image: document.getElementById("newsImage"),
        fact1: document.getElementById("fact1"),
        fact2: document.getElementById("fact2"),
        category: document.getElementById("categoryTag")
    };

    document.addEventListener("DOMContentLoaded", () => {
        if (params.get("headline")) elements.headline.innerText = params.get("headline");
        if (params.get("image"))    elements.image.src = params.get("image");
        if (params.get("fact1"))    elements.fact1.innerText = params.get("fact1");
        if (params.get("fact2"))    elements.fact2.innerText = params.get("fact2");
        if (params.get("category")) elements.category.innerText = params.get("category").toUpperCase();
    });
</script>

</body>
</html>
