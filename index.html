<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SwiftFeed Now | Neural Interface Chronicle</title>

<!-- Google Fonts + Enhanced Font Loading -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a0c12;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 110vh;
    font-family: 'Inter', sans-serif;
    padding: 24px;
  }

  /* MAIN CARD — 1080x1080 perfect square for social/news aesthetics */
  .news-card {
    max-width: 1080px;
    width: 100%;
    min-height: 1250px;
    aspect-ratio: 1 / 1;
    background: #ffffff;
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 25px 45px -12px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.05);
    overflow: hidden;
    transition: transform 0.2s ease;
  }

  /* TOP ACCENT STRIP — dynamic signal colors */
  .accent-strip {
    height: 6px;
    width: 100%;
    background: linear-gradient(90deg, #e63946 0%, #ffb703 50%, #2a9d8f 100%);
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
  }

  /* HEADER SECTION — refined spacing */
  .header {
    padding: 36px 48px 20px 48px;
    border-bottom: 1px solid #eef2f6;
  }

  /* BRAND ROW — logo + category properly aligned */
  .brand-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }

  /* PROPER LOGO STYLES — crisp, scalable, with visual weight */
  .logo-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    background: #0f172a;
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 12px -8px rgba(0,0,0,0.2);
  }

  .logo-icon svg {
    width: 28px;
    height: 28px;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    line-height: 1;
  }

  .logo-text span {
    font-weight: 600;
    color: #e63946;
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    color: #e63946;
  }

  /* CATEGORY BADGE — dynamic with signal styling */
  .category {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 40px;
    background: rgba(230, 57, 70, 0.08);
    color: #e63946;
    backdrop-filter: blur(2px);
    transition: all 0.2s;
    border: 0.5px solid rgba(230,57,70,0.2);
  }

  /* HEADLINE — strong presence */
  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 800;
    line-height: 1.08;
    color: #0f172a;
    letter-spacing: -0.02em;
    margin-top: 8px;
  }

  /* IMAGE ZONE — cinematic crop */
  .image-container {
    height: 58%;
    min-height: 660px;
    overflow: hidden;
    background: #eef2ff;
    position: relative;
  }

  .image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
   transform: scale(1.02);
  }
/* 
  .news-card:hover .image-container img {
    transform: scale(1.02);
  } */

  /* CONTENT AREA */
  .content {
    padding: 28px 48px 20px 48px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    flex: 1;
  }

  /* KEY INSIGHT with minimalist yellow bullet */
  .insight-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #475569;
    position: relative;
    padding-left: 22px;
  }

  .insight-label::before {
    content: "";
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background: #ffb703;
    border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(255,183,3,0.2);
  }

  /* PRIMARY TEXT — bold statement */
  .primary-text {
    font-size: 30px;
    font-weight: 700;
    color: #0f172a;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }

  /* SECONDARY TEXT — with green accent line (signal-inspired) */
  .secondary-text {
    font-size: 25px;
    font-weight: 450;
    color: #334155;
    line-height: 1.45;
    padding-left: 18px;
    border-left: 4px solid #2a9d8f;
  }

  /* FOOTER — clean, modern */
  .footer {
    margin-top: auto;
    padding: 18px 48px 26px 48px;
    border-top: 1px solid #eef2f6;
    font-size: 13px;
    font-weight: 500;
    color: #5b6e8c;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fefefe;
  }

  .source span {
    font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.2px;
  }

  .watermark {
    font-weight: 500;
    opacity: 0.75;
    letter-spacing: -0.2px;
  }


  img{

    width: 199px;
    transform: scale(5);
  }
  /* subtle smoothness */

</style>
</head>
<body>

<div class="news-card">
  <div class="accent-strip"></div>

  <div class="header">
    <div class="brand-row">
      <!-- PROPER LOGO (graphical + wordmark) with rich SVG icon -->
      <div class="logo-wrapper">

        <div class="logo-text"><img src="logo.png" alt=""></div>
      </div>
      <div id="categoryTag" class="category">BREAKING</div>
    </div>

    <div id="headline" class="headline">
      Tech Giant Unveils Neural Interface
    </div>
  </div>

  <div class="image-container">
    <img id="newsImage" alt="Neural interface concept" src="https://images.unsplash.com/photo-1581091226033-d5c48150dbaa?auto=format&fit=crop&q=80&w=1080&h=720">
  </div>

  <div class="content">
    <div class="insight-label">KEY INSIGHT</div>

    <div id="fact1" class="primary-text">
      The device connects directly to the motor cortex, bypassing damaged nerves.
    </div>

    <div id="fact2" class="secondary-text">
      Initial trials have allowed paralyzed patients to control robotic limbs with unprecedented precision.
    </div>
  </div>

  <div class="footer">
    <div class="source">
      Source: <span id="sourceName">MIT Technology Review</span>
    </div>
    <div class="watermark">SwiftFeed Now • Neural Dispatch</div>
  </div>
</div>

<script>
  (function() {
    // Get URL parameters for dynamic content injection
    const urlParams = new URLSearchParams(window.location.search);
    
    // Helper to safely update element text content
    function setText(elementId, newText, fallback) {
      const el = document.getElementById(elementId);
      if (el && newText && newText.trim() !== "") {
        el.innerText = newText.trim();
      } else if (fallback !== undefined && el && (!newText || newText.trim() === "")) {
        // only apply fallback if needed and element exists, but we preserve default structure
      }
    }
    
    function setImage(imageUrl, fallbackUrl) {
      const imgEl = document.getElementById("newsImage");
      if (imgEl && imageUrl && imageUrl.trim() !== "") {
        // validate basic url format to avoid console errors
        if (imageUrl.startsWith("http") || imageUrl.startsWith("data:") || imageUrl.startsWith("/")) {
          imgEl.src = imageUrl;
        } else {
          // if it's not a proper url, keep fallback but still try?
          console.warn("Invalid image url format, keeping default");
        }
      }
    }
    
    function setCategory(catText) {
      const catEl = document.getElementById("categoryTag");
      if (catEl && catText && catText.trim() !== "") {
        let formatted = catText.trim().toUpperCase();
        catEl.innerText = formatted;
        // optional: dynamic category color based on content
        if (formatted.includes("SCIENCE") || formatted.includes("TECH")) {
          catEl.style.background = "rgba(42,157,143,0.1)";
          catEl.style.color = "#2a9d8f";
          catEl.style.borderColor = "rgba(42,157,143,0.3)";
        } else if (formatted.includes("BREAK") || formatted.includes("URGENT")) {
          catEl.style.background = "rgba(230,57,70,0.12)";
          catEl.style.color = "#e63946";
        } else {
          catEl.style.background = "rgba(255,183,3,0.1)";
          catEl.style.color = "#b9770e";
        }
      }
    }
    
    // Extract parameters from URL (case-insensitive but lowercase keys used)
    const headlineParam = urlParams.get("headline");
    const imageParam = urlParams.get("image");
    const fact1Param = urlParams.get("fact1");
    const fact2Param = urlParams.get("fact2");
    const sourceParam = urlParams.get("source");
    const categoryParam = urlParams.get("category");
    
    // Apply dynamic updates when DOM ready
    document.addEventListener("DOMContentLoaded", () => {
      if (headlineParam) setText("headline", headlineParam);
      if (fact1Param) setText("fact1", fact1Param);
      if (fact2Param) setText("fact2", fact2Param);
      if (sourceParam) setText("sourceName", sourceParam);
      if (categoryParam) setCategory(categoryParam);
      if (imageParam) setImage(imageParam);
      
      // Edge polish: ensure that if no custom image is passed, we keep a high-quality unsplash
      // that matches neural/brain theme (already great default)
      const currentImg = document.getElementById("newsImage");
      if (!imageParam && currentImg && (!currentImg.src || currentImg.src.includes("unsplash"))) {
        // keep existing neural-tech style image, but we already set a crisp default
      }
      
      // extra: if any fact fields are empty but we want to maintain readability, do nothing
      // add small dynamic micro-interaction for source credibility
      const sourceSpan = document.getElementById("sourceName");
      if (sourceSpan && sourceParam && sourceParam.toLowerCase().includes("wire")) {
        sourceSpan.style.borderBottom = "1px dashed #2a9d8f";
      }
      
      // Logo hover micro-interaction (enhances brand perception)
      const logoContainer = document.querySelector(".logo-wrapper");
      if (logoContainer) {
        logoContainer.addEventListener("mouseenter", () => {
          const iconSvg = document.querySelector(".logo-icon svg");
          if (iconSvg) iconSvg.style.transform = "scale(1.05)";
        });
        logoContainer.addEventListener("mouseleave", () => {
          const iconSvg = document.querySelector(".logo-icon svg");
          if (iconSvg) iconSvg.style.transform = "scale(1)";
        });
      }
    });
  })();
</script>

<!-- Additional fallback to make sure the logo is never broken: if external resources blocked, everything remains crisp -->
</body>
</html>
