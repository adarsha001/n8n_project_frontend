<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Viral Feed | Dark Edition</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #121212; /* Darker page background */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Arial Black', sans-serif; /* Aggressive bold font */
    padding: 20px;
  }

  /* MAIN CARD — Now pure black with no borders/shadows for high impact */
  .news-card {
    max-width: 600px;
    width: 100%;
    background: #000000;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* HEADER SECTION — Updated for bold yellow text */
  .header {
    padding: 25px 20px;
    text-align: center;
  }

  /* HEADLINE — Strong Yellow, All Caps */
  .headline {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.2;
    color: #f6e500; /* Signature Viral Yellow */
    text-transform: uppercase;
    letter-spacing: -0.5px;
  }

  /* IMAGE ZONE — Full width, no padding */
  .image-container {
    width: 100%;
    background: #111;
  }

  .image-container img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
  }

  /* CONTENT AREA */
  .content {
    padding: 25px 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    text-align: center;
  }

  /* PRIMARY TEXT — The main quote in Yellow */
  .primary-text {
    font-size: 26px;
    font-weight: 900;
    color: #f6e500;
    line-height: 1.1;
    text-transform: uppercase;
  }

  /* SECONDARY TEXT — Accent text in White */
  .secondary-text {
    font-size: 20px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.2;
    text-transform: uppercase;
  }

  /* FOOTER — Simple and clean */
  .footer {
    padding: 0 20px 30px 20px;
    font-size: 28px;
    text-align: center;
  }

  /* Hiding decorative elements from previous design to match new minimalist style */
  .accent-strip, .brand-row, .insight-label::before {
    display: none;
  }

  .source, .watermark {
    color: #555;
    font-size: 12px;
    text-transform: none;
    font-family: sans-serif;
  }
</style>
</head>
<body>

<div class="news-card">
  <div class="accent-strip"></div>

  <div class="header">
    <div id="headline" class="headline">
      ACTOR FROM RAMAYANA, WHO PLAYS VISHWAMITRA, RECENTLY SHARED HIGH PRAISE FOR YASH'S PORTRAYAL OF RAVANA
    </div>
  </div>

  <div class="image-container">
    <img id="newsImage" alt="Ravana" src="https://via.placeholder.com/600x700/111/f6e500?text=YASH+AS+RAVANA">
  </div>

  <div class="content">
    <div id="fact1" class="primary-text">
      HE SAID: "WORKING WITH YASH IN RAMAYANA... WHAT AN ACTOR. THE AURA, THE POWER, THE WAY HE'S OWNED RAVANA — JUST CRAZY."
    </div>

    <div id="fact2" class="secondary-text">
      THE RAVANA STORM IS BUILDING.
    </div>
  </div>

  <div class="footer">
  
    <div class="source" style="margin-top: 15px;">
      Source: <span id="sourceName">Screenplay Memes</span>
    </div>
  </div>
</div>

<script>
  (function() {
    const urlParams = new URLSearchParams(window.location.search);
    
    function setText(elementId, newText) {
      const el = document.getElementById(elementId);
      if (el && newText) el.innerText = newText.toUpperCase();
    }
    
    // Existing logic preserved
    const headlineParam = urlParams.get("headline");
    const fact1Param = urlParams.get("fact1");
    const fact2Param = urlParams.get("fact2");
    
    document.addEventListener("DOMContentLoaded", () => {
      if (headlineParam) setText("headline", headlineParam);
      if (fact1Param) setText("fact1", fact1Param);
      if (fact2Param) setText("fact2", fact2Param);
    });
  })();
</script>

</body>
</html>
